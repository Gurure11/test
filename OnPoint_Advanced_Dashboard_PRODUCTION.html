
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnPoint Group | Revenue Intelligence Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
body { font-family:'Inter',sans-serif;background:#f4f6f9;margin:0;padding:20px;color:#1a2c3e;}
.header { background:white;padding:25px;border-radius:20px;margin-bottom:25px;box-shadow:0 10px 25px rgba(0,0,0,0.05);}
h1 { margin:0;color:#1e3c72;font-size:28px;font-weight:800;}
.kpi-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:25px;}
.kpi-card { background:white;padding:20px;border-radius:20px;box-shadow:0 6px 20px rgba(0,0,0,0.04);}
.kpi-value { font-size:26px;font-weight:700;margin-top:10px;}
.card { background:white;padding:20px;border-radius:20px;margin-bottom:25px;box-shadow:0 6px 20px rgba(0,0,0,0.04);}
table { width:100%;border-collapse:collapse;font-size:13px;}
th,td { padding:10px;border-bottom:1px solid #eee;text-align:left;}
th { background:#f8fafc;font-weight:600;}
.btn { padding:10px 18px;border:none;border-radius:8px;background:#1e3c72;color:white;cursor:pointer;}
.btn:hover{opacity:0.9;}
.chart-container{height:350px;}
</style>
</head>

<body>

<div class="header">
<h1>OnPoint Group Revenue Intelligence</h1>
<div>Live Connected to Bothwell & Bothwell_Revenue Sheets</div>
<button class="btn" onclick="loadAllData()">Refresh Data</button>
</div>

<div class="kpi-grid">
<div class="kpi-card"><div>Total Confirmed</div><div id="kpiConfirmed" class="kpi-value">R0</div></div>
<div class="kpi-card"><div>YTD Revenue</div><div id="kpiYTD" class="kpi-value">R0</div></div>
<div class="kpi-card"><div>MTD Revenue</div><div id="kpiMTD" class="kpi-value">R0</div></div>
<div class="kpi-card"><div>Today Revenue</div><div id="kpiToday" class="kpi-value">R0</div></div>
</div>

<div class="card">
<h3>Manager Performance Chart</h3>
<div id="managerChart" class="chart-container"></div>
</div>

<div class="card">
<h3>Projects (Bothwell)</h3>
<div id="projectsTable"></div>
</div>

<div class="card">
<h3>Revenue (Bothwell_Revenue)</h3>
<div id="revenueTable"></div>
</div>

<script>
const SCRIPT_URL = "PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE";

async function loadAllData(){
if(!SCRIPT_URL || SCRIPT_URL.includes("PASTE")){
alert("Please paste your deployed Apps Script URL.");
return;
}

const projRes = await fetch(`${SCRIPT_URL}?action=getProjects`);
const revRes = await fetch(`${SCRIPT_URL}?action=getRevenue`);

const projData = await projRes.json();
const revData = await revRes.json();

renderProjects(projData.data);
renderRevenue(revData.data);
calculateKPIs(projData.data, revData.data);
renderChart(revData.data);
}

function renderProjects(data){
if(!data) return;
let html="<table><thead><tr>";
data[0].forEach((_,i)=>html+=`<th>Col ${i+1}</th>`);
html+="</tr></thead><tbody>";
data.forEach(r=>{
html+="<tr>";
r.forEach(c=>html+=`<td>${c}</td>`);
html+="</tr>";
});
html+="</tbody></table>";
document.getElementById("projectsTable").innerHTML=html;
}

function renderRevenue(data){
if(!data) return;
let html="<table><thead><tr>";
data[0].forEach((_,i)=>html+=`<th>Col ${i+1}</th>`);
html+="</tr></thead><tbody>";
data.forEach(r=>{
html+="<tr>";
r.forEach(c=>html+=`<td>${c}</td>`);
html+="</tr>";
});
html+="</tbody></table>";
document.getElementById("revenueTable").innerHTML=html;
}

function calculateKPIs(projects,revenue){
let totalConfirmed=0;
projects.forEach(r=>{ if(r[6]) totalConfirmed+=Number(r[6]); });

let ytd=0,mtd=0,today=0;
const now=new Date();
revenue.forEach(r=>{
const amount=Number(r[4])||0;
const d=new Date(r[0]);
if(d.getFullYear()===now.getFullYear()) ytd+=amount;
if(d.getMonth()===now.getMonth()) mtd+=amount;
if(d.toDateString()===now.toDateString()) today+=amount;
});

document.getElementById("kpiConfirmed").innerText="R"+totalConfirmed.toLocaleString();
document.getElementById("kpiYTD").innerText="R"+ytd.toLocaleString();
document.getElementById("kpiMTD").innerText="R"+mtd.toLocaleString();
document.getElementById("kpiToday").innerText="R"+today.toLocaleString();
}

function renderChart(revenue){
const managerTotals={};
revenue.forEach(r=>{
const pm=r[2];
const amt=Number(r[4])||0;
managerTotals[pm]=(managerTotals[pm]||0)+amt;
});

const options={
chart:{type:'bar',height:350},
series:[{name:'Revenue',data:Object.values(managerTotals)}],
xaxis:{categories:Object.keys(managerTotals)},
};

if(window.chart){ window.chart.destroy(); }
window.chart=new ApexCharts(document.querySelector("#managerChart"),options);
window.chart.render();
}

loadAllData();
</script>

</body>
</html>
