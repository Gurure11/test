    // Aggregated totals

    const formatCurrency = (val) => new Intl.NumberFormat("en-ZA", { style: "currency", currency: "ZAR", maximumFractionDigits: 0 }).format(val || 0);
    const percentOf = (actual, target) => target ? Math.round((actual / target) * 100) : 0;
    
    function calculateDailyBudget(projectTotal) { return (projectTotal / 12 / 22); }
    function getProjectByPM(pm, projectName) { return projects.find(p => p.pm === pm && p.project === projectName); }
    function getAllPMs() { return [...new Set(PROJECT_MANAGERS)]; }
    
    // Get cost centre performance data
    function getCostCentrePerformance() {
        const ccMap = new Map();
        const today = new Date().toISOString().split('T')[0];
        const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];
        const currentMonth = new Date().getMonth();
        
        projects.forEach(p => {
            const dailyBudget = calculateDailyBudget(p.totalValue);
            const monthlyBudget = p.totalValue / 12;
            const weeklyBudget = dailyBudget * 7;
            
            if (!ccMap.has(p.division)) {
                ccMap.set(p.division, {
                    name: p.division,
                    dailyBudget: 0, dailyActual: 0, dailyAchievement: 0,
                    weeklyBudget: 0, weeklyActual: 0, weeklyAchievement: 0,
                    monthlyBudget: 0, monthlyActual: 0, monthlyAchievement: 0,
                    projects: []
                });
            }
            const cc = ccMap.get(p.division);
            cc.dailyBudget += dailyBudget;
            cc.weeklyBudget += weeklyBudget;
            cc.monthlyBudget += monthlyBudget;
            cc.projects.push(p);
        });
        
        revenueEntries.forEach(r => {
            if (ccMap.has(r.division)) {
                const cc = ccMap.get(r.division);
                const revenueDate = new Date(r.date);
                cc.dailyActual += (r.date === today) ? r.amount : 0;
                if (r.date >= weekAgo) cc.weeklyActual += r.amount;
                if (revenueDate.getMonth() === currentMonth) cc.monthlyActual += r.amount;
            }
        });
        
        for (let [_, cc] of ccMap) {
            cc.dailyAchievement = percentOf(cc.dailyActual, cc.dailyBudget);
            cc.weeklyAchievement = percentOf(cc.weeklyActual, cc.weeklyBudget);
            cc.monthlyAchievement = percentOf(cc.monthlyActual, cc.monthlyBudget);
        }
        return Array.from(ccMap.values()).sort((a,b) => b.dailyAchievement - a.dailyAchievement);
    }
    
    // Get manager performance data with variance %
    function getManagerPerformance() {
        const managerMap = new Map();
        const today = new Date().toISOString().split('T')[0];
        const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];
        const currentMonth = new Date().getMonth();
        
        PROJECT_MANAGERS.forEach(manager => {
            const managerProjects = projects.filter(p => p.pm === manager);
            let dailyBudget = 0, weeklyBudget = 0, monthlyBudget = 0, yearlyBudget = 0;
            managerProjects.forEach(p => {
                const db = calculateDailyBudget(p.totalValue);
                dailyBudget += db;
                weeklyBudget += db * 7;
                monthlyBudget += p.totalValue / 12;
                yearlyBudget += p.totalValue;
            });
            
            managerMap.set(manager, {
                pm: manager,
                dailyBudget, weeklyBudget, monthlyBudget, yearlyBudget,
                dailyActual: 0, weeklyActual: 0, monthlyActual: 0, yearlyActual: 0,
                dailyVariance: 0, weeklyVariance: 0, monthlyVariance: 0, yearlyVariance: 0,
                dailyVariancePercent: 0, weeklyVariancePercent: 0, monthlyVariancePercent: 0, yearlyVariancePercent: 0,
                dailyAchievement: 0, weeklyAchievement: 0, monthlyAchievement: 0, yearlyAchievement: 0,
                projects: managerProjects
            });
        });
        
        revenueEntries.forEach(r => {
            if (managerMap.has(r.pm)) {
                const m = managerMap.get(r.pm);
                const revenueDate = new Date(r.date);
                m.dailyActual += (r.date === today) ? r.amount : 0;
                if (r.date >= weekAgo) m.weeklyActual += r.amount;
                if (revenueDate.getMonth() === currentMonth && revenueDate.getFullYear() === new Date().getFullYear()) m.monthlyActual += r.amount;
                m.yearlyActual += r.amount;
            }
        });
        
        for (let [_, m] of managerMap) {
            m.dailyVariance = m.dailyActual - m.dailyBudget;
            m.dailyVariancePercent = m.dailyBudget > 0 ? ((m.dailyVariance / m.dailyBudget) * 100).toFixed(1) : 0;
            m.dailyAchievement = percentOf(m.dailyActual, m.dailyBudget);
            
            m.weeklyVariance = m.weeklyActual - m.weeklyBudget;
            m.weeklyVariancePercent = m.weeklyBudget > 0 ? ((m.weeklyVariance / m.weeklyBudget) * 100).toFixed(1) : 0;
            m.weeklyAchievement = percentOf(m.weeklyActual, m.weeklyBudget);
            
            m.monthlyVariance = m.monthlyActual - m.monthlyBudget;
            m.monthlyVariancePercent = m.monthlyBudget > 0 ? ((m.monthlyVariance / m.monthlyBudget) * 100).toFixed(1) : 0;
            m.monthlyAchievement = percentOf(m.monthlyActual, m.monthlyBudget);
            
            m.yearlyVariance = m.yearlyActual - m.yearlyBudget;
            m.yearlyVariancePercent = m.yearlyBudget > 0 ? ((m.yearlyVariance / m.yearlyBudget) * 100).toFixed(1) : 0;
            m.yearlyAchievement = percentOf(m.yearlyActual, m.yearlyBudget);
        }
        return Array.from(managerMap.values()).sort((a,b) => b.dailyAchievement - a.dailyAchievement);
    }
    
    function calculateRevenueAggregates() {
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth();
        
        let ytd = 0, mtd = 0;
        revenueEntries.forEach(entry => {
            const entryDate = new Date(entry.date);
            if (entryDate.getFullYear() === currentYear) {
                ytd += entry.amount;
                if (entryDate.getMonth() === currentMonth) mtd += entry.amount;
            }
        });
        
        ytdTotal = ytd;
        mtdTotal = mtd;
        btyeTotal = (totalConfirmed + totalForecast) - ytdTotal;
    }

        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        const twoDaysAgo = new Date(Date.now() - 172800000).toISOString().split('T')[0];

            const dailyBudget = calculateDailyBudget(p.totalValue);
            demo.push({ date: today, division: p.division, pm: p.pm, project: p.project, amount: dailyBudget * (0.85 + Math.random() * 0.3), dailyBudget, variance: 0, notes: "" });
            demo.push({ date: yesterday, division: p.division, pm: p.pm, project: p.project, amount: dailyBudget * (0.7 + Math.random() * 0.4), dailyBudget, variance: 0, notes: "" });
            demo.push({ date: twoDaysAgo, division: p.division, pm: p.pm, project: p.project, amount: dailyBudget * (0.6 + Math.random() * 0.5), dailyBudget, variance: 0, notes: "" });
        });
        if (revenueEntries.length === 0) revenueEntries = demo;
    }

        const today = new Date().toISOString().split('T')[0];
        const todayRevenue = revenueEntries.filter(r => r.date === today).reduce((s, r) => s + r.amount, 0);
        const todayBudget = projects.reduce((s, p) => s + calculateDailyBudget(p.totalValue), 0);
        return { actual: todayRevenue, budget: todayBudget, variance: todayRevenue - todayBudget, achievement: percentOf(todayRevenue, todayBudget) };
    }

            <div class="kpi-card"><div class="kpi-value">${formatCurrency(ytdTotal)}</div><div class="kpi-label">YTD Actual Revenue</div><div class="kpi-trend">Year to Date</div></div>
            <div class="kpi-card"><div class="kpi-value">${formatCurrency(btyeTotal)}</div><div class="kpi-label">Group BTYE</div><div class="kpi-trend">Budget to Year End</div></div>
            <div class="kpi-card"><div class="kpi-value">${formatCurrency(mtdTotal)}</div><div class="kpi-label">MTD Actual</div><div class="kpi-trend">Month to Date</div></div>
            <div class="kpi-card"><div class="kpi-value">${todayStats.achievement}%</div><div class="kpi-label">Today's Achievement</div><div class="kpi-trend ${todayStats.variance >= 0 ? 'text-success' : 'text-danger'}">${todayStats.variance >= 0 ? 'Above' : 'Below'} target</div></div>
        </div>`;
    }
    
    function renderCostCentrePerformance() {
        const costCentres = getCostCentrePerformance();
        return `
            <div class="card-modern">
                <div class="card-header-modern"><h3><i class="fas fa-building"></i> Cost Centre Performance</h3><select id="ccPeriodSelect" class="form-control" style="width: auto;" onchange="updateCCPerformance(this.value)"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></div>
                <div class="card-body-modern">
                    <div style="overflow-x: auto;">
                        <table class="data-table"><thead> tr<th>Cost Centre</th><th>Budget</th><th>Actual</th><th>Variance (R)</th><th>Achievement %</th><th>Status</th> </thead><tbody>
                            ${costCentres.map(cc => {
                                let budget = cc.dailyBudget, actual = cc.dailyActual, achievement = cc.dailyAchievement;
                                if (document.getElementById("ccPeriodSelect")?.value === "weekly") { budget = cc.weeklyBudget; actual = cc.weeklyActual; achievement = cc.weeklyAchievement; }
                                if (document.getElementById("ccPeriodSelect")?.value === "monthly") { budget = cc.monthlyBudget; actual = cc.monthlyActual; achievement = cc.monthlyAchievement; }
                                const variance = actual - budget;
                                return `<tr><td><strong>${cc.name}</strong></td><td>${formatCurrency(budget)}</td><td>${formatCurrency(actual)}</td><td class="${variance >= 0 ? 'text-success' : 'text-danger'}">${formatCurrency(variance)}</td><td class="${achievement >= 80 ? 'text-success' : achievement >= 50 ? 'text-warning' : 'text-danger'} fw-bold">${achievement}%</td><td><span class="badge-${achievement >= 80 ? 'confirmed' : 'forecast'}">${achievement >= 80 ? 'On Target' : 'Behind'}</span></td></tr>`;
                            }).join("")}
                        </tbody> </table>
                    </div>
                </div>
            </div>
        `;
    }
    
    function renderManagerRanking() {
        const managers = getManagerPerformance();
        return `
            <div class="card-modern">
                <div class="card-header-modern"><h3><i class="fas fa-trophy"></i> Managers Performance Ranking</h3><select id="perfPeriodSelect" class="form-control" style="width: auto;" onchange="changePerfPeriod(this.value)"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option><option value="yearly">Yearly</option></select></div>
                <div class="card-body-modern">
                    <div style="overflow-x: auto;">
                        <table class="data-table"><thead> <th>Rank</th><th>Project Manager</th><th>Projects</th><th>Budget</th><th>Actual</th><th>Variance (R)</th><th>Variance %</th><th>Achievement %</th><th>Status</th> </thead><tbody>
                            ${managers.map((m, idx) => {
                                let budget = m.dailyBudget, actual = m.dailyActual, variance = m.dailyVariance, variancePct = m.dailyVariancePercent, achievement = m.dailyAchievement;
                                if (selectedPeriod === 'weekly') { budget = m.weeklyBudget; actual = m.weeklyActual; variance = m.weeklyVariance; variancePct = m.weeklyVariancePercent; achievement = m.weeklyAchievement; }
                                else if (selectedPeriod === 'monthly') { budget = m.monthlyBudget; actual = m.monthlyActual; variance = m.monthlyVariance; variancePct = m.monthlyVariancePercent; achievement = m.monthlyAchievement; }
                                else if (selectedPeriod === 'yearly') { budget = m.yearlyBudget; actual = m.yearlyActual; variance = m.yearlyVariance; variancePct = m.yearlyVariancePercent; achievement = m.yearlyAchievement; }
                                return `<tr class="clickable-row" onclick="filterByManager('${m.pm}')"><td><strong>#${idx+1}</strong><td><strong>${m.pm}</strong><td>${m.projects.length}<td>${formatCurrency(budget)}<td>${formatCurrency(actual)}<td class="${variance >= 0 ? 'text-success' : 'text-danger'}">${formatCurrency(variance)}<td class="${variance >= 0 ? 'text-success' : 'text-danger'}">${variancePct}%<td class="${achievement >= 80 ? 'text-success' : achievement >= 50 ? 'text-warning' : 'text-danger'} fw-bold">${achievement}%<td><span class="badge-${achievement >= 80 ? 'confirmed' : 'forecast'}">${achievement >= 80 ? 'On Track' : 'Needs Attention'}</span></tr>`;
                            }).join("")}
                        </tbody> </table>
                    </div>
                </div>
            </div>
        `;
    }
    
    function renderManagerPerformanceCharts() {
        const managers = getManagerPerformance();
        const categories = managers.map(m => m.pm);
        const dailyVariancePct = managers.map(m => parseFloat(m.dailyVariancePercent));
        const weeklyVariancePct = managers.map(m => parseFloat(m.weeklyVariancePercent));
        const monthlyVariancePct = managers.map(m => parseFloat(m.monthlyVariancePercent));
        
        setTimeout(() => {
            const options = {
                chart: { type: 'bar', height: 450, toolbar: { show: true }, animations: { enabled: true } },
                series: [
                    { name: 'Daily Variance %', data: dailyVariancePct, color: '#2a5298' },
                    { name: 'Weekly Variance %', data: weeklyVariancePct, color: '#f59e0b' },
                    { name: 'Monthly Variance %', data: monthlyVariancePct, color: '#10b981' }
                ],
                xaxis: { categories, title: { text: 'Project Managers' }, labels: { rotate: -45, style: { fontSize: '11px' } } },
                yaxis: { title: { text: 'Variance %' }, labels: { formatter: (val) => val + '%' } },
                plotOptions: { bar: { borderRadius: 8, columnWidth: '60%', dataLabels: { position: 'top' } } },
                dataLabels: { enabled: true, formatter: (val) => val + '%', offsetY: -20, style: { fontSize: '11px', fontWeight: 'bold' } },
                tooltip: { y: { formatter: (val) => val + '% variance' } },
                title: { text: 'Manager Performance Variance % (Daily, Weekly, Monthly)', align: 'center', style: { fontSize: '14px', fontWeight: 'bold' } },
                grid: { borderColor: '#e2e8f0' }
            };
            if (window.varianceChart) {
                window.varianceChart.updateOptions({ xaxis: { categories } });
                window.varianceChart.updateSeries([{ name: 'Daily Variance %', data: dailyVariancePct }, { name: 'Weekly Variance %', data: weeklyVariancePct }, { name: 'Monthly Variance %', data: monthlyVariancePct }]);
            } else {
                window.varianceChart = new ApexCharts(document.querySelector("#varianceChart"), options);
                window.varianceChart.render();
            }
        }, 100);
        
        return `<div class="card-modern"><div class="card-header-modern"><h3><i class="fas fa-chart-line"></i> Managers Performance Comparison - Variance % Analysis</h3></div><div class="card-body-modern"><div id="varianceChart" class="chart-container"></div></div></div>`;
    }
    
    function renderProjectPerformance() {
        const managers = getManagerPerformance();
        const filteredManagers = selectedManagerFilter === "all" ? managers : managers.filter(m => m.pm === selectedManagerFilter);
        return `
            <div class="card-modern">
                <div class="card-header-modern"><h3><i class="fas fa-chart-line"></i> Project Performance Details</h3><button class="btn-outline" onclick="resetManagerFilter()">Clear Filter</button></div>
                <div class="card-body-modern">
                    <div style="overflow-x: auto;">
                        <table class="data-table"><thead> <th>Project Manager</th><th>Project</th><th>Division</th><th>Daily Actual</th><th>Daily Budget</th><th>Daily Achv</th><th>Weekly Achv</th><th>Monthly Achv</th><th>Status</th> </thead><tbody>
                            ${filteredManagers.flatMap(m => m.projects.map(p => {
                                const dailyBudget = calculateDailyBudget(p.totalValue);
                                const monthlyBudget = p.totalValue / 12;
                                const projectRevenue = revenueEntries.filter(r => r.pm === p.pm && r.project === p.project);
                                const dailyActual = projectRevenue.filter(r => r.date === new Date().toISOString().split('T')[0]).reduce((s, r) => s + r.amount, 0);
                                const dailyAch = percentOf(dailyActual, dailyBudget);
                                const weekAgo = new Date(Date.now() - 7*86400000).toISOString().split('T')[0];
                                const weeklyActual = projectRevenue.filter(r => r.date >= weekAgo).reduce((s, r) => s + r.amount, 0);
                                const weeklyAch = percentOf(weeklyActual, dailyBudget * 7);
                                const currentMonth = new Date().getMonth();
                                const monthlyActual = projectRevenue.filter(r => new Date(r.date).getMonth() === currentMonth).reduce((s, r) => s + r.amount, 0);
                                const monthlyAch = percentOf(monthlyActual, monthlyBudget);
                                return `<tr><td>${p.pm}<td><strong>${p.project}</strong><td>${p.division}<td>${formatCurrency(dailyActual)}<td>${formatCurrency(dailyBudget)}<td class="${dailyAch >= 80 ? 'text-success' : 'text-warning'}">${dailyAch}%<td class="${weeklyAch >= 80 ? 'text-success' : 'text-warning'}">${weeklyAch}%<td class="${monthlyAch >= 80 ? 'text-success' : 'text-warning'}">${monthlyAch}%<td><span class="badge-confirmed">Active</span></tr>`;
                            })).join("")}
                        </tbody> </table>
                    </div>
                </div>
            </div>
        `;
    }
    
    function renderDailyRevenueForm() {
        const pms = getAllPMs();
        const divisions = [...new Set(projects.map(p => p.division))];
        return `
            <div class="card-modern">
                <div class="card-header-modern"><h3><i class="fas fa-calendar-day"></i> Daily Revenue Entry</h3></div>
                <div class="card-body-modern">
                    <form id="revenueForm" onsubmit="event.preventDefault(); submitRevenueForm();">
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                            <div><label class="form-label">Date *</label><input type="date" id="revDate" class="form-control" value="${new Date().toISOString().split('T')[0]}" required></div>
                            <div><label class="form-label">Cost Centre *</label><select id="revDivision" class="form-select"><option value="">Select</option>${divisions.map(d => `<option value="${d}">${d}</option>`).join("")}</select></div>
                            <div><label class="form-label">Project Manager *</label><select id="revPM" class="form-select" onchange="updateProjectOptions()"><option value="">Select Manager</option>${pms.map(pm => `<option value="${pm}">${pm}</option>`).join("")}</select></div>
                            <div><label class="form-label">Project *</label><select id="revProject" class="form-select" onchange="updateBudgetFromProject()"><option value="">Select Project</option></select></div>
                            <div><label class="form-label">Daily Revenue (R) *</label><input type="number" id="revAmount" class="form-control" step="1000" required oninput="updateVariance()"></div>
                            <div><label class="form-label">Monthly Budget (R)</label><input type="text" id="revMonthlyBudget" class="form-control" readonly></div>
                            <div><label class="form-label">Daily Budget (R)</label><input type="text" id="revDailyBudget" class="form-control" readonly></div>
                            <div><label class="form-label">Variance (R)</label><input type="text" id="revVariance" class="form-control" readonly></div>
                            <div><label class="form-label">Notes</label><input type="text" id="revNotes" class="form-control" placeholder="Optional notes"></div>
                        </div>
                        <div style="margin-top: 24px;"><button type="submit" class="btn-primary"><i class="fas fa-save me-2"></i>Save Revenue</button></div>
                    </form>
                </div>
            </div>
            <div class="daily-stats"><div class="stat-card"><div class="stat-label">Today's Total</div><div class="stat-value" id="todayTotal">${formatCurrency(getTodayStats().actual)}</div></div><div class="stat-card"><div class="stat-label">Today's Budget</div><div class="stat-value" id="todayBudget">${formatCurrency(getTodayStats().budget)}</div></div><div class="stat-card"><div class="stat-label">Today's Variance</div><div class="stat-value ${getTodayStats().variance >= 0 ? 'text-success' : 'text-danger'}" id="todayVariance">${formatCurrency(getTodayStats().variance)}</div></div><div class="stat-card"><div class="stat-label">Achievement</div><div class="stat-value" id="todayAchievement">${getTodayStats().achievement}%</div></div></div>
        `;
    }
    
    function renderAllProjects() {
        return `<div class="card-modern"><div class="card-header-modern"><h3><i class="fas fa-folder-tree"></i> All Projects</h3><button class="btn-outline" onclick="exportToExcel()"><i class="fas fa-download"></i> Export</button></div><div class="card-body-modern" style="overflow-x: auto;"><table class="data-table"><thead> <th>ID</th><th>Division</th><th>PM</th><th>Project</th><th>Client</th><th>Total Value</th><th>GP%</th><th>Deadline</th><th>Quality</th><th>Action</th> </thead><tbody>${projects.map(p => `<tr><td>${p.id}<td>${p.division}<td>${p.pm}<td><strong>${p.project}</strong><td>${p.client}<td>${formatCurrency(p.totalValue)}<td>${p.gpPercent}%<td>${p.deadlineScore}%<td>${p.qualityScore}%<td><span class="badge-${p.actionStatus === 'Closed' ? 'confirmed' : 'forecast'}">${p.actionStatus}</span></tr>`).join("")}</tbody> </table></div></div>`;
    }
    
    function render() {
        const kpiHtml = renderKPIs();
        let mainContent = "";
        if (activeTab === "dashboard") mainContent = renderCostCentrePerformance() + renderManagerRanking() + renderProjectPerformance();
        else if (activeTab === "revenue") mainContent = renderDailyRevenueForm() + renderManagerRanking() + renderProjectPerformance();
        else if (activeTab === "projects") mainContent = renderAllProjects();
        else if (activeTab === "analytics") mainContent = renderManagerPerformanceCharts() + renderManagerRanking() + renderCostCentrePerformance();
        
        const html = `<div class="header"><div class="logo-area"><h1><i class="fas fa-chart-network me-2"></i> OnPoint Group</h1><p>Revenue Intelligence & Managers Performance Dashboard</p><div><i class="fas fa-sync-alt me-1"></i> Last updated: ${new Date().toLocaleString()}</div></div></div>${kpiHtml}<div class="nav-modern"><button class="nav-btn ${activeTab === "dashboard" ? "active" : ""}" onclick="setTab('dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</button><button class="nav-btn ${activeTab === "revenue" ? "active" : ""}" onclick="setTab('revenue')"><i class="fas fa-calendar-day"></i> Daily Revenue</button><button class="nav-btn ${activeTab === "projects" ? "active" : ""}" onclick="setTab('projects')"><i class="fas fa-table-list"></i> Projects</button><button class="nav-btn ${activeTab === "analytics" ? "active" : ""}" onclick="setTab('analytics')"><i class="fas fa-chart-line"></i> Analytics</button><button class="nav-btn" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Export</button></div>${mainContent}`;
        document.getElementById("appRoot").innerHTML = html;
    }
    
    // Global functions
    window.setTab = (tab) => { activeTab = tab; render(); };
    window.changePerfPeriod = (period) => { selectedPeriod = period; render(); };
    window.updateCCPerformance = (period) => { render(); };
    window.filterByManager = (pm) => { selectedManagerFilter = pm; render(); };
    window.resetManagerFilter = () => { selectedManagerFilter = "all"; render(); };
    window.updateProjectOptions = () => {
        const pm = document.getElementById("revPM")?.value;
        const projectSelect = document.getElementById("revProject");
        if (projectSelect && pm) {
            const pmProjects = projects.filter(p => p.pm === pm);
            projectSelect.innerHTML = '<option value="">Select Project</option>' + pmProjects.map(p => `<option value="${p.project}" data-total="${p.totalValue}">${p.project}</option>`).join("");
        }
    };
    window.updateBudgetFromProject = () => {
        const pm = document.getElementById("revPM")?.value;
        const projectName = document.getElementById("revProject")?.value;
        const projectObj = getProjectByPM(pm, projectName);
        const monthlyBudgetField = document.getElementById("revMonthlyBudget");
        const dailyBudgetField = document.getElementById("revDailyBudget");
        if (projectObj && monthlyBudgetField && dailyBudgetField) {
            const monthlyBudget = projectObj.totalValue / 12;
            const dailyBudget = calculateDailyBudget(projectObj.totalValue);
            monthlyBudgetField.value = formatCurrency(monthlyBudget);
            dailyBudgetField.value = formatCurrency(dailyBudget);
        } else {
            if (monthlyBudgetField) monthlyBudgetField.value = "";
            if (dailyBudgetField) dailyBudgetField.value = "";
        }
        window.updateVariance();
    };
    window.updateVariance = () => {
        const amount = parseFloat(document.getElementById("revAmount")?.value || 0);
        const budgetText = document.getElementById("revDailyBudget")?.value || "R 0";
        const budget = parseFloat(budgetText.replace(/[^0-9.-]/g, '')) || 0;
        const variance = amount - budget;
        const varianceEl = document.getElementById("revVariance");
        if (varianceEl) { varianceEl.value = formatCurrency(variance); varianceEl.style.color = variance >= 0 ? "#10b981" : "#ef4444"; }
    };
    window.submitRevenueForm = () => {
        const date = document.getElementById("revDate").value;
        const division = document.getElementById("revDivision").value;
        const pm = document.getElementById("revPM").value;
        const project = document.getElementById("revProject").value;
        const amount = parseFloat(document.getElementById("revAmount").value);
        const notes = document.getElementById("revNotes").value;
        if (!date || !division || !pm || !project || !amount) { showToast("Please fill all required fields", "error"); return; }
        const projectObj = getProjectByPM(pm, project);
        const dailyBudget = projectObj ? calculateDailyBudget(projectObj.totalValue) : 0;
        submitDailyRevenue({ date, division, pm, project, amount, dailyBudget, monthlyBudget: projectObj ? projectObj.totalValue / 12 : 0, variance: amount - dailyBudget, notes });
    };
    window.exportToExcel = () => {
        const wsData = [["Date", "Division", "PM", "Project", "Amount", "Daily Budget", "Monthly Budget", "Variance", "Notes"]];
        revenueEntries.forEach(r => wsData.push([r.date, r.division, r.pm, r.project, r.amount, r.dailyBudget, r.monthlyBudget || 0, r.variance, r.notes || ""]));
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Revenue");
        XLSX.writeFile(wb, `onpoint_revenue_report_${new Date().toISOString().slice(0,10)}.xlsx`);
        showToast("Export complete", "success");
    };
    
    function showToast(msg, type) { const toast = document.createElement("div"); toast.className = "status-toast"; toast.innerHTML = `<i class="fas fa-${type === "success" ? "check-circle" : "info-circle"} me-2"></i>${msg}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
    function showLoading(msg) { const overlay = document.getElementById("loadingOverlay"); if (overlay) { document.getElementById("loadingMsg").innerText = msg; overlay.style.display = "flex"; } }
    function hideLoading() { const overlay = document.getElementById("loadingOverlay"); if (overlay) overlay.style.display = "none"; }
    
    loadFromSheets().then(() => render());
</script>
</body>
</html>
