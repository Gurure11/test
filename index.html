<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onpoint Group Live Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<style>
body { background:#eef2ff; padding:20px; font-family:Arial; }
.card { border-radius:15px; margin-bottom:20px; }
</style>
</head>
<body>

<div class="container">
<h2>ONPOINT GROUP - LIVE DASHBOARD</h2>

<div class="card p-3">
<h5>Today's Stats</h5>
<div>Total: <span id="todayTotal">R 0</span></div>
<div>Budget: <span id="todayBudget">R 0</span></div>
<div>Achievement: <span id="todayAchievement">0%</span></div>
</div>

<div class="card p-3">
<h5>Manager Ranking</h5>
<table class="table" id="managerRankingTable"></table>
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmjcENlkMDkvw8rRGhWU-9OsJqmjim8ndUyq6gNhDI9BfKcbFZKL96Rz83bkzvpuXQ/exec";

let projects = [];
let dailyRevenue = [];

function formatCurrency(v){ return 'R ' + (Math.round(v||0)).toLocaleString(); }

async function loadAllData(){
    try{
        let res = await fetch(SCRIPT_URL + "?action=getAllData");
        let data = await res.json();
        projects = data.projects || [];
        dailyRevenue = data.revenue || [];
        refreshUI();
    }catch(e){
        alert("Error loading data");
    }
}

function refreshUI(){
    let today = new Date().toISOString().slice(0,10);

    let total = dailyRevenue.filter(r=>r.date===today)
        .reduce((s,r)=>s+Number(r.amount),0);

    let budget = 0;
    projects.forEach(p=>{
        let m = new Date().getMonth();
        if(p.months && p.months[m]){
            budget += p.months[m]/22;
        }
    });

    let ach = budget ? (total/budget*100):0;

    document.getElementById("todayTotal").innerText = formatCurrency(total);
    document.getElementById("todayBudget").innerText = formatCurrency(budget);
    document.getElementById("todayAchievement").innerText = ach.toFixed(1)+"%";

    buildRanking(today);
}

function buildRanking(today){
    let map = {};

    projects.forEach(p=>{
        if(!map[p.manager]) map[p.manager]={budget:0,actual:0};

        let m = new Date().getMonth();
        map[p.manager].budget += (p.months?.[m]||0)/22;
    });

    dailyRevenue.filter(r=>r.date===today)
    .forEach(r=>{
        if(map[r.manager]){
            map[r.manager].actual += Number(r.amount);
        }
    });

    let html = "<tr><th>Manager</th><th>Budget</th><th>Actual</th><th>Achievement</th></tr>";

    Object.keys(map).forEach(pm=>{
        let b = map[pm].budget;
        let a = map[pm].actual;
        let ach = b ? (a/b*100):0;

        html += `<tr>
            <td>${pm}</td>
            <td>${formatCurrency(b)}</td>
            <td>${formatCurrency(a)}</td>
            <td>${ach.toFixed(1)}%</td>
        </tr>`;
    });

    document.getElementById("managerRankingTable").innerHTML = html;
}

loadAllData();
setInterval(loadAllData,30000);
</script>

</body>
</html>
