<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>On Point Group - Financial Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
font-family:Segoe UI;
}

.container-box{
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.kpi-card{
border-radius:15px;
padding:20px;
color:white;
}

.kpi-orders{background:#1e3c72;}
.kpi-forecast{background:#17a2b8;}
.kpi-actual{background:#28a745;}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="text-white mb-4">
<i class="fa-solid fa-chart-line"></i>
On Point Group Financial Dashboard
</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="kpi-card kpi-orders">

<h6>Total Order Book</h6>
<h2 id="orderBookTotal">R0</h2>

</div>
</div>

<div class="col-md-4">
<div class="kpi-card kpi-forecast">

<h6>Forecast Revenue</h6>
<h2 id="forecastRevenue">R0</h2>

</div>
</div>

<div class="col-md-4">
<div class="kpi-card kpi-actual">

<h6>Actual Revenue</h6>
<h2 id="actualRevenue">R0</h2>

</div>
</div>

</div>


<div class="container-box mt-4">

<h4>Projects (Order Book)</h4>

<table class="table table-striped">

<thead>
<tr>
<th>Company</th>
<th>Project</th>
<th>Manager</th>
<th>Status</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>

</table>

</div>


<div class="container-box mt-4">

<h4>Daily Revenue</h4>

<table class="table table-striped">

<thead>
<tr>
<th>Date</th>
<th>Project</th>
<th>Manager</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="revenueTable"></tbody>

</table>

</div>

</div>


<script>

const CONFIG = {

scriptURL: "PASTE_YOUR_APPS_SCRIPT_URL",

ordersSheetId: "1qXz55Luti1s-0dh8qCPwxupX14kCNhtyWPJF6dpUdF0",

revenueSheetId: "16zsV_C-2pz5gyka2fjlSZZoC5cDZcR3-cokS4Cx1rDE"

}

let ordersData=[]
let revenueData=[]


function formatCurrency(value){

return new Intl.NumberFormat('en-ZA',{
style:'currency',
currency:'ZAR',
minimumFractionDigits:0
}).format(value)

}



async function loadProjects(){

const url=`${CONFIG.scriptURL}?action=getProjects`

const res=await fetch(url)

const json=await res.json()

ordersData=json.data || []

renderOrders()

calculateDashboard()

}



async function loadRevenue(){

const url=`${CONFIG.scriptURL}?action=getRevenue`

const res=await fetch(url)

const json=await res.json()

revenueData=json.data || []

renderRevenue()

calculateDashboard()

}



function renderOrders(){

let html=""

ordersData.forEach(p=>{

html+=`
<tr>
<td>${p.company}</td>
<td>${p.project}</td>
<td>${p.manager}</td>
<td>${p.status}</td>
<td>${formatCurrency(p.amount)}</td>
</tr>
`

})

document.getElementById("ordersTable").innerHTML=html

}



function renderRevenue(){

let html=""

revenueData.forEach(r=>{

html+=`
<tr>
<td>${r.date}</td>
<td>${r.projectName}</td>
<td>${r.manager}</td>
<td>${formatCurrency(r.amount)}</td>
</tr>
`

})

document.getElementById("revenueTable").innerHTML=html

}



function calculateDashboard(){

let orderBook=0
let forecast=0
let actual=0


ordersData.forEach(p=>{

orderBook+=Number(p.amount || 0)

if(p.months){

p.months.forEach(m=>{

forecast+=Number(m)

})

}

})


revenueData.forEach(r=>{

actual+=Number(r.amount || 0)

})


document.getElementById("orderBookTotal").innerText=formatCurrency(orderBook)

document.getElementById("forecastRevenue").innerText=formatCurrency(forecast)

document.getElementById("actualRevenue").innerText=formatCurrency(actual)

}



document.addEventListener("DOMContentLoaded",()=>{

loadProjects()

loadRevenue()

})

</script>

</body>

</html>
